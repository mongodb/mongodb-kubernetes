# New release process: publishes the images already promoted for the given
# commit (via the mainline mckci_release_promote task) without rebuilding or
# retesting anything.
#
# Pushes a "new-X.Y.Z" tag, which Evergreen's git_tag_aliases (.evergreen.yml)
# routes to the publish-only pipeline (.evergreen-release-publish.yml). That
# pipeline's own retag_new_release task pushes the final "X.Y.Z" tag and flips
# this workflow's draft GH release to published once the publish succeeds —
# this workflow does not do that itself, since it can't wait on Evergreen.
name: Release MCK version (publish-only)

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'SHA of the already-promoted commit to publish'
        type: string
        required: true
      version:
        description: 'Version to release'
        required: true
        type: string

jobs:
  crate_draft_release_notes:
    name: Create draft release with Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: '0'
      - name: Setup host
        uses: ./.github/actions/setup-ubuntu-host
        with:
          python-version: '${{ vars.PYTHON_VERSION }}'
      - name: Generate Release Notes
        id: generate_release_notes
        run: python -m scripts.release.release_notes -s $INITIAL_COMMIT_SHA -v $INITIAL_VERSION -o release_notes_final.md
        env:
          INITIAL_COMMIT_SHA: ${{ vars.RELEASE_INITIAL_COMMIT_SHA }}
          INITIAL_VERSION: ${{ vars.RELEASE_INITIAL_VERSION }}
      - name: Generate draft release
        run: |
          gh release create $VERSION --target $COMMIT_SHA --draft --latest --notes-file release_notes_final.md --title "Release of MCK $VERSION"
        env:
          VERSION: ${{ github.event.inputs.version }}
          COMMIT_SHA: ${{ github.event.inputs.commit_sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  approve_release:
    name: Create Git Tag + start Evergreen jobs
    environment: production
    runs-on: ubuntu-latest
    needs: crate_draft_release_notes
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: '0'
      - name: Create git tag
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "new-$VERSION" -m "Release of MCK $VERSION" $COMMIT_SHA
          git push origin "new-$VERSION"
        env:
          VERSION: ${{ github.event.inputs.version }}
          COMMIT_SHA: ${{ github.event.inputs.commit_sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

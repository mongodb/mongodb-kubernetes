name: Go Bump Policy

on:
  schedule:
    # Runs on the 1st and 15th of each month at 08:00 UTC (~every 2 weeks).
    - cron: '0 8 1,15 * *'
  workflow_dispatch:
    inputs:
      soak_days:
        description: 'Override POLICY_SOAK_DAYS (days the latest minor .0 must age before we bump). Leave blank to use the script default (90).'
        required: false
        type: string
        default: ''

jobs:
  check-and-bump:
    name: Check and bump Go version if due
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
          cache: false

      - name: Run Go bump policy check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POLICY_SOAK_DAYS: ${{ inputs.soak_days }}
        run: scripts/check-go-bump-policy.sh

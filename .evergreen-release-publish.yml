# New release process, triggered by tags shaped "new-X.Y.Z" (see .evergreen.yml
# git_tag_aliases). Unlike the legacy process (.evergreen-release.yml, deprecated),
# this does not rebuild or retest anything: it publishes the images already
# promoted for the tagged commit (via the mainline mckci_release_promote task)
# straight to production.
include:
  - filename: .evergreen-functions.yml

tasks:
  - name: mckci_release_publish_group
    allowed_requesters: [ "patch", "github_tag" ]
    commands:
      - func: clone
      - func: setup_building_host
      - command: shell.exec
        type: test
        params:
          working_dir: src/github.com/mongodb/mongodb-kubernetes
          script: |
            scripts/mckci release publish group --commit "${revision}"

  # Runs after the publish task succeeds: pushes the final "X.Y.Z" tag (which
  # is not itself a trigger) and deletes "new-X.Y.Z".
  - name: retag_new_release
    commands:
      - func: clone
      - func: push_release_tag
        vars:
          prefix: "new-"

  # Fires the public docs-snippet refresh once the release is actually public (after
  # retag_new_release, not the earlier promote/publish steps). Not a release gate: nothing depends
  # on its result. Master only, and the check is against ${revision} not branch_name - see
  # scripts/dev/trigger_public_docs_snippets.sh for why, and how to trigger a backport refresh by hand.
  - name: trigger_public_docs_snippets
    commands:
      - func: clone
      - func: compute_release_version
      - command: shell.exec
        params:
          working_dir: src/github.com/mongodb/mongodb-kubernetes
          include_expansions_in_env:
            - revision
            - RELEASE_VERSION
          script: |
            ./scripts/dev/trigger_public_docs_snippets.sh

buildvariants:
  - name: release_publish
    display_name: release_publish
    tags: [ "release-publish" ]
    run_on:
      - release-ubuntu2404-small # This is required for CISA attestation https://jira.mongodb.org/browse/DEVPROD-17780
    allowed_requesters: [ "patch", "github_tag" ]
    tasks:
      - name: mckci_release_publish_group

  # Not tagged "release-publish" itself (it depends on that tag succeeding,
  # which would otherwise create a self-dependency).
  - name: retag_new_release
    display_name: retag_new_release
    run_on:
      - ubuntu2404-small
    allowed_requesters: [ "patch", "github_tag" ]
    depends_on:
      - name: "*"
        variant: ".release-publish"
        status: "success"
    tasks:
      - name: retag_new_release

  # Depends on retag_new_release itself (not just ".release-publish"), since that's the task that
  # confirms the release is actually public - see the comment on the trigger_public_docs_snippets
  # task above.
  - name: trigger_public_docs_snippets
    display_name: trigger_public_docs_snippets
    run_on:
      - ubuntu2404-small
    allowed_requesters: [ "patch", "github_tag" ]
    depends_on:
      - name: retag_new_release
        variant: retag_new_release
        status: "success"
    tasks:
      - name: trigger_public_docs_snippets

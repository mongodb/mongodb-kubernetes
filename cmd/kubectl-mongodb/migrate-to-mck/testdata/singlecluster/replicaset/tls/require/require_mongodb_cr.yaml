apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
  name: tls-rs
  namespace: mongodb
spec:
  agent:
    maxLogFileDurationHours: 0
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  credentials: my-credentials
  externalMembers:
  - hostname: vm-0.example.com:27017
    processName: tls-rs-0
    replicaSetName: tls-rs
    type: mongod
  - hostname: vm-1.example.com:27017
    processName: tls-rs-1
    replicaSetName: tls-rs
    type: mongod
  - hostname: vm-2.example.com:27017
    processName: tls-rs-2
    replicaSetName: tls-rs
    type: mongod
  featureCompatibilityVersion: "7.0"
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      agents:
        mode: SCRAM
      enabled: true
      ignoreUnknownUsers: true
      internalCluster: X509
      modes:
      - SCRAM
    certsSecretPrefix: mdb
    tls:
      ca: tls-rs-ca
  type: ReplicaSet
  version: 7.0.12-ent

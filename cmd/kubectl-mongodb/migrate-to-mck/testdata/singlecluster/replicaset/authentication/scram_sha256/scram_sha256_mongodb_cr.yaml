apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
    mongodb.com/migration-dry-run: "true"
  name: scram-rs
  namespace: mongodb
spec:
  agent:
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  credentials: my-credentials
  externalMembers:
  - hostname: vm-0.example.com:27017
    processName: scram-rs-0
    replicaSetName: scram-rs
    type: mongod
  - hostname: vm-1.example.com:27017
    processName: scram-rs-1
    replicaSetName: scram-rs
    type: mongod
  - hostname: vm-2.example.com:27017
    processName: scram-rs-2
    replicaSetName: scram-rs
    type: mongod
  featureCompatibilityVersion: "8.0"
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      agents:
        mode: SCRAM
      enabled: true
      ignoreUnknownUsers: true
      modes:
      - SCRAM
    roles:
    - db: myapp
      privileges:
      - actions:
        - find
        - listCollections
        resource:
          db: myapp
      role: appReadOnly
      roles:
      - db: myapp
        role: read
    - db: admin
      privileges:
      - actions:
        - serverStatus
        - replSetGetStatus
        resource:
          cluster: true
      role: metricsReader
  type: ReplicaSet
  version: 8.0.4-ent

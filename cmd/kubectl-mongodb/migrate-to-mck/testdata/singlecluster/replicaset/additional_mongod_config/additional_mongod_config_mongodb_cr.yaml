apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
  name: amc-rs
  namespace: mongodb
spec:
  additionalMongodConfig:
    auditLog:
      destination: file
      format: JSON
      path: /var/log/mongodb/audit.json
    net:
      compression:
        compressors: zlib,zstd
      maxIncomingConnections: 512
      port: 27018
    operationProfiling:
      mode: slowOp
      slowOpThresholdMs: 200
    replication:
      oplogSizeMB: 2048
    setParameter:
      authenticationMechanisms: SCRAM-SHA-256
      connPoolMaxConnsPerHost: 800
    storage:
      directoryPerDB: true
      indexBuildRetry: true
      journal:
        enabled: true
      wiredTiger:
        collectionConfig:
          blockCompressor: snappy
          configString: block_compressor=zlib
        engineConfig:
          cacheSizeGB: 1.5
          configString: builtin_extension_config=(zlib=(compression_level=2))
          journalCompressor: zlib
          zstdCompressionLevel: 6
  agent:
    maxLogFileDurationHours: 0
    mongod:
      systemLog:
        destination: file
        logAppend: true
        path: /var/log/mongodb/mongod.log
  credentials: my-credentials
  externalMembers:
  - hostname: vm-0.example.com:27018
    processName: amc-rs-0
    replicaSetName: amc-rs
    type: mongod
  - hostname: vm-1.example.com:27018
    processName: amc-rs-1
    replicaSetName: amc-rs
    type: mongod
  - hostname: vm-2.example.com:27018
    processName: amc-rs-2
    replicaSetName: amc-rs
    type: mongod
  featureCompatibilityVersion: "8.0"
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      agents:
        mode: SCRAM
      enabled: true
      ignoreUnknownUsers: true
      modes:
      - SCRAM
  type: ReplicaSet
  version: 8.0.4-ent

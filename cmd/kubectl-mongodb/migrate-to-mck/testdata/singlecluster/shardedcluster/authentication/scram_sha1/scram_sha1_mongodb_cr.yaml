apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
    mongodb.com/migration-dry-run: "true"
  name: sc-scram-sha1-cluster
  namespace: mongodb
spec:
  agent:
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  configServerNameOverride: sc-scram-sha1-csrs
  configSrv:
    additionalMongodConfig:
      net:
        port: 27019
  credentials: my-credentials
  externalMembers:
  - hostname: config-0.example.com:27019
    processName: sc-scram-sha1-csrs-0
    replicaSetName: sc-scram-sha1-csrs
    type: mongod
  - hostname: config-1.example.com:27019
    processName: sc-scram-sha1-csrs-1
    replicaSetName: sc-scram-sha1-csrs
    type: mongod
  - hostname: shard-0.example.com:27018
    processName: sc-scram-sha1-shard-rs-0
    replicaSetName: sc-scram-sha1-shard-rs
    type: mongod
  - hostname: shard-1.example.com:27018
    processName: sc-scram-sha1-shard-rs-1
    replicaSetName: sc-scram-sha1-shard-rs
    type: mongod
  - hostname: mongos-0.example.com:27017
    processName: sc-scram-sha1-mongos-0
    type: mongos
  featureCompatibilityVersion: "8.0"
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      agents:
        mode: MONGODB-CR
      enabled: true
      ignoreUnknownUsers: true
      modes:
      - SCRAM-SHA-1
      - MONGODB-CR
  shard:
    additionalMongodConfig:
      net:
        port: 27018
  shardCount: 1
  shardNameOverrides:
  - replicaSetName: sc-scram-sha1-shard-rs
    shardId: sc-scram-sha1-shard
    shardName: sc-scram-sha1-cluster-0
  type: ShardedCluster
  version: 8.0.4-ent

apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
    mongodb.com/migration-dry-run: "true"
  name: ldap-cluster
  namespace: mongodb
spec:
  agent:
    maxLogFileDurationHours: 0
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  configServerCount: 2
  configServerNameOverride: ldap-csrs
  configSrv:
    additionalMongodConfig:
      net:
        port: 27019
      sharding:
        clusterRole: configsvr
    agent:
      maxLogFileDurationHours: 0
  credentials: my-credentials
  externalMembers:
  - hostname: config-0.example.com:27019
    processName: ldap-csrs-0
    replicaSetName: ldap-csrs
    type: mongod
  - hostname: config-1.example.com:27019
    processName: ldap-csrs-1
    replicaSetName: ldap-csrs
    type: mongod
  - hostname: shard-0.example.com:27018
    processName: ldap-shard-rs-0
    replicaSetName: ldap-shard-rs
    type: mongod
  - hostname: shard-1.example.com:27018
    processName: ldap-shard-rs-1
    replicaSetName: ldap-shard-rs
    type: mongod
  - hostname: mongos-0.example.com:27017
    processName: ldap-mongos-0
    type: mongos
  featureCompatibilityVersion: "8.0"
  mongodsPerShardCount: 2
  mongosCount: 1
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      agents:
        automationPasswordSecretRef:
          key: password
          name: ldap-agent-password
        automationUserName: uid=mms-automation-agent,ou=groups,dc=example,dc=org
        mode: LDAP
      enabled: true
      ignoreUnknownUsers: true
      ldap:
        bindQueryPasswordSecretRef:
          name: ldap-bind-query-password
        bindQueryUser: cn=admin,dc=example,dc=org
        servers:
        - openldap.mongodb.svc.cluster.local:389
        timeoutMS: 0
        transportSecurity: none
        userCacheInvalidationInterval: 0
        validateLDAPServerConfig: true
      modes:
      - SCRAM
      - LDAP
  shard:
    additionalMongodConfig:
      net:
        port: 27018
      sharding:
        clusterRole: shardsvr
    agent:
      maxLogFileDurationHours: 0
  shardCount: 1
  shardNameOverrides:
  - replicaSetName: ldap-shard-rs
    shardId: ldap-shard
    shardName: ldap-cluster-0
  type: ShardedCluster
  version: 8.0.4-ent
---
apiVersion: v1
kind: Secret
metadata:
  name: ldap-bind-query-password
  namespace: mongodb
stringData:
  password: ldap-admin-password
---
apiVersion: v1
kind: Secret
metadata:
  name: ldap-agent-password
  namespace: mongodb
stringData:
  password: agent-ldap-password

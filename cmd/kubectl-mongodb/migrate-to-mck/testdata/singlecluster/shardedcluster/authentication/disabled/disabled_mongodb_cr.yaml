apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
    mongodb.com/migration-dry-run: "true"
  name: sc-disabled-cluster
  namespace: mongodb
spec:
  agent:
    maxLogFileDurationHours: 0
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  configServerCount: 2
  configServerNameOverride: sc-disabled-csrs
  configSrv:
    additionalMongodConfig:
      net:
        port: 27019
      sharding:
        clusterRole: configsvr
    agent:
      maxLogFileDurationHours: 0
  credentials: my-credentials
  externalMembers:
  - hostname: config-0.example.com:27019
    processName: sc-disabled-csrs-0
    replicaSetName: sc-disabled-csrs
    type: mongod
  - hostname: config-1.example.com:27019
    processName: sc-disabled-csrs-1
    replicaSetName: sc-disabled-csrs
    type: mongod
  - hostname: shard-0.example.com:27018
    processName: sc-disabled-shard-rs-0
    replicaSetName: sc-disabled-shard-rs
    type: mongod
  - hostname: shard-1.example.com:27018
    processName: sc-disabled-shard-rs-1
    replicaSetName: sc-disabled-shard-rs
    type: mongod
  - hostname: mongos-0.example.com:27017
    processName: sc-disabled-mongos-0
    type: mongos
  featureCompatibilityVersion: "8.0"
  mongodsPerShardCount: 2
  mongosCount: 1
  opsManager:
    configMapRef:
      name: my-om-config
  shard:
    additionalMongodConfig:
      net:
        port: 27018
      sharding:
        clusterRole: shardsvr
    agent:
      maxLogFileDurationHours: 0
  shardCount: 1
  shardNameOverrides:
  - replicaSetName: sc-disabled-shard-rs
    shardId: sc-disabled-shard
    shardName: sc-disabled-cluster-0
  type: ShardedCluster
  version: 8.0.4-ent

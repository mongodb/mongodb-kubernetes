apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
    mongodb.com/migration-dry-run: "true"
  name: sc-x509only-cluster
  namespace: mongodb
spec:
  agent:
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  configServerNameOverride: sc-x509only-csrs
  configSrv:
    additionalMongodConfig:
      net:
        port: 27019
        tls:
          allowConnectionsWithoutCertificates: false
  credentials: my-credentials
  externalMembers:
  - hostname: config-0.example.com:27019
    processName: sc-x509only-csrs-0
    replicaSetName: sc-x509only-csrs
    type: mongod
  - hostname: config-1.example.com:27019
    processName: sc-x509only-csrs-1
    replicaSetName: sc-x509only-csrs
    type: mongod
  - hostname: shard-0.example.com:27018
    processName: sc-x509only-shard-rs-0
    replicaSetName: sc-x509only-shard-rs
    type: mongod
  - hostname: shard-1.example.com:27018
    processName: sc-x509only-shard-rs-1
    replicaSetName: sc-x509only-shard-rs
    type: mongod
  - hostname: mongos-0.example.com:27017
    processName: sc-x509only-mongos-0
    type: mongos
  featureCompatibilityVersion: "8.0"
  mongos:
    additionalMongodConfig:
      net:
        tls:
          allowConnectionsWithoutCertificates: false
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      agents:
        autoPEMKeyFilePath: /mongodb-agent/agent.pem
        automationUserName: CN=mms-automation-agent,OU=ENG,O=MongoDB,L=NY,ST=NY,C=US
        clientCertificateSecretRef:
          key: tls.crt
          name: mdb-sc-x509only-cluster-agent-certs
        mode: X509
      enabled: true
      modes:
      - X509
    certsSecretPrefix: mdb
    tls:
      ca: sc-x509only-cluster-ca
  shard:
    additionalMongodConfig:
      net:
        port: 27018
        tls:
          allowConnectionsWithoutCertificates: false
  shardCount: 1
  shardNameOverrides:
  - replicaSetName: sc-x509only-shard-rs
    shardId: sc-x509only-shard
    shardName: sc-x509only-cluster-0
  type: ShardedCluster
  version: 8.0.4-ent

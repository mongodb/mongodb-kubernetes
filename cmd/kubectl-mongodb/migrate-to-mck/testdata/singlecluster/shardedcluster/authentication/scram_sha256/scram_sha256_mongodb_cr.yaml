apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
    mongodb.com/migration-dry-run: "true"
  name: sc-scram-cluster
  namespace: mongodb
spec:
  agent:
    maxLogFileDurationHours: 0
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  configServerCount: 2
  configServerNameOverride: sc-scram-csrs
  configSrv:
    additionalMongodConfig:
      net:
        port: 27019
      sharding:
        clusterRole: configsvr
    agent:
      maxLogFileDurationHours: 0
  credentials: my-credentials
  externalMembers:
  - hostname: config-0.example.com:27019
    processName: sc-scram-csrs-0
    replicaSetName: sc-scram-csrs
    type: mongod
  - hostname: config-1.example.com:27019
    processName: sc-scram-csrs-1
    replicaSetName: sc-scram-csrs
    type: mongod
  - hostname: shard-0.example.com:27018
    processName: sc-scram-shard-rs-0
    replicaSetName: sc-scram-shard-rs
    type: mongod
  - hostname: shard-1.example.com:27018
    processName: sc-scram-shard-rs-1
    replicaSetName: sc-scram-shard-rs
    type: mongod
  - hostname: mongos-0.example.com:27017
    processName: sc-scram-mongos-0
    type: mongos
  featureCompatibilityVersion: "8.0"
  mongodsPerShardCount: 2
  mongosCount: 1
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      agents:
        mode: SCRAM
      enabled: true
      ignoreUnknownUsers: true
      modes:
      - SCRAM
  shard:
    additionalMongodConfig:
      net:
        port: 27018
      sharding:
        clusterRole: shardsvr
    agent:
      maxLogFileDurationHours: 0
  shardCount: 1
  shardNameOverrides:
  - replicaSetName: sc-scram-shard-rs
    shardId: sc-scram-shard
    shardName: sc-scram-cluster-0
  type: ShardedCluster
  version: 8.0.4-ent

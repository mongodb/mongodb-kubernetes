apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
    mongodb.com/migration-dry-run: "true"
  name: prom-cluster
  namespace: mongodb
spec:
  agent:
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  configServerNameOverride: prom-csrs
  configSrv:
    additionalMongodConfig:
      net:
        port: 27019
      sharding:
        clusterRole: configsvr
  credentials: my-credentials
  externalMembers:
  - hostname: config-0.example.com:27019
    processName: prom-csrs-0
    replicaSetName: prom-csrs
    type: mongod
  - hostname: config-1.example.com:27019
    processName: prom-csrs-1
    replicaSetName: prom-csrs
    type: mongod
  - hostname: shard-0.example.com:27018
    processName: prom-shard-rs-0
    replicaSetName: prom-shard-rs
    type: mongod
  - hostname: shard-1.example.com:27018
    processName: prom-shard-rs-1
    replicaSetName: prom-shard-rs
    type: mongod
  - hostname: mongos-0.example.com:27017
    processName: prom-mongos-0
    type: mongos
  featureCompatibilityVersion: "8.0"
  opsManager:
    configMapRef:
      name: my-om-config
  prometheus:
    passwordSecretRef:
      key: password
      name: prometheus-password
    port: 9216
    username: prom-user
  shard:
    additionalMongodConfig:
      net:
        port: 27018
      sharding:
        clusterRole: shardsvr
  shardCount: 1
  shardNameOverrides:
  - replicaSetName: prom-shard-rs
    shardId: prom-shard
    shardName: prom-cluster-0
  type: ShardedCluster
  version: 8.0.4-ent

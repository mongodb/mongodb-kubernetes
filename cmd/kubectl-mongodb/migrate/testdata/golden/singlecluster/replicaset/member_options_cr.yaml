apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
  name: member-rs
spec:
  agent:
    maxLogFileDurationHours: 0
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  credentials: my-credentials
  externalMembers:
  - hostname: vm-0.example.com:27017
    processName: member-rs-0
    replicaSetName: member-rs
    type: mongod
  - hostname: vm-1.example.com:27017
    processName: member-rs-1
    replicaSetName: member-rs
    type: mongod
  - hostname: vm-2.example.com:27017
    processName: member-rs-2
    replicaSetName: member-rs
    type: mongod
  featureCompatibilityVersion: "8.0"
  memberConfig:
  - priority: "0"
    tags:
      region: us-east-1
      role: primary
    votes: 0
  - priority: "0"
    tags:
      region: us-east-1
      role: delayed
    votes: 0
  - priority: "0"
    tags:
      region: us-west-2
    votes: 0
  members: 3
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      agents:
        mode: SCRAM-SHA-256
      enabled: true
      ignoreUnknownUsers: true
      modes:
      - SCRAM-SHA-256
  type: ReplicaSet
  version: 8.0.4-ent

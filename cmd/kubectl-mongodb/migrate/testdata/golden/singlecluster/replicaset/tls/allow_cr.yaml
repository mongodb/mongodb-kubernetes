apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
  name: allow-rs
spec:
  additionalMongodConfig:
    net:
      tls:
        mode: allowTLS
  agent:
    maxLogFileDurationHours: 0
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  credentials: my-credentials
  externalMembers:
  - allow-rs-0
  - allow-rs-1
  featureCompatibilityVersion: "8.0"
  memberConfig:
  - priority: "0"
    votes: 0
  - priority: "0"
    votes: 0
  members: 2
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      enabled: true
      ignoreUnknownUsers: true
      modes:
      - SCRAM-SHA-256
    tls:
      enabled: true
  type: ReplicaSet
  version: 8.0.4-ent

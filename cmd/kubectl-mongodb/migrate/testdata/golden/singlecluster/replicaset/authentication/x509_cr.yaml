apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
  name: x509-rs
spec:
  agent:
    maxLogFileDurationHours: 0
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  credentials: my-credentials
  externalMembers:
  - x509-rs-0
  - x509-rs-1
  - x509-rs-2
  featureCompatibilityVersion: "8.0"
  memberConfig:
  - priority: "0"
    votes: 0
  - priority: "0"
    votes: 0
  - priority: "0"
    votes: 0
  members: 3
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      enabled: true
      ignoreUnknownUsers: true
      internalCluster: X509
      modes:
      - SCRAM-SHA-256
      - X509
    tls:
      enabled: true
  type: ReplicaSet
  version: 8.0.4-ent

apiVersion: mongodb.com/v1
kind: MongoDBUser
metadata:
  name: app-user
spec:
  db: admin
  migratedFromVm: true
  mongodbResourceRef:
    name: scram-rs
  passwordSecretKeyRef:
    key: password
    name: app-user-password
  roles:
  - db: myapp
    name: readWrite
  - db: reporting
    name: read
  username: app-user

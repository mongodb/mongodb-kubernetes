apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
  name: x509only-rs
  namespace: mongodb
spec:
  agent:
    maxLogFileDurationHours: 0
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /data/mongodb.log
  credentials: my-credentials
  externalMembers:
  - hostname: vm-0.example.com:27017
    processName: x509only-rs-0
    replicaSetName: x509only-rs
    type: mongod
  - hostname: vm-1.example.com:27017
    processName: x509only-rs-1
    replicaSetName: x509only-rs
    type: mongod
  - hostname: vm-2.example.com:27017
    processName: x509only-rs-2
    replicaSetName: x509only-rs
    type: mongod
  featureCompatibilityVersion: "7.0"
  memberConfig:
  - priority: "0"
    votes: 0
  - priority: "0"
    votes: 0
  - priority: "0"
    votes: 0
  members: 3
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      agents:
        automationUserName: CN=mms-automation-agent,OU=ENG,O=MongoDB,L=NY,ST=NY,C=US
        mode: X509
      enabled: true
      modes:
      - X509
    certsSecretPrefix: mdb
  type: ReplicaSet
  version: 7.0.12

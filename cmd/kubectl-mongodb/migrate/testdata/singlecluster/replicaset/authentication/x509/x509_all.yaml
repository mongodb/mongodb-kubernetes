apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  annotations:
    mongodb.com/migrate-tool-version: latest
  name: x509-rs
spec:
  agent:
    maxLogFileDurationHours: 0
    mongod:
      systemLog:
        destination: file
        logAppend: false
        path: /var/log/mongodb/mongod.log
  credentials: my-credentials
  externalMembers:
  - hostname: vm-0.example.com:27017
    processName: x509-rs-0
    replicaSetName: x509-rs
    type: mongod
  - hostname: vm-1.example.com:27017
    processName: x509-rs-1
    replicaSetName: x509-rs
    type: mongod
  - hostname: vm-2.example.com:27017
    processName: x509-rs-2
    replicaSetName: x509-rs
    type: mongod
  featureCompatibilityVersion: "8.0"
  memberConfig:
  - priority: "0"
    votes: 0
  - priority: "0"
    votes: 0
  - priority: "0"
    votes: 0
  members: 3
  opsManager:
    configMapRef:
      name: my-om-config
  security:
    authentication:
      agents:
        mode: SCRAM
      enabled: true
      ignoreUnknownUsers: true
      internalCluster: X509
      modes:
      - SCRAM
      - X509
    certsSecretPrefix: mdb
  type: ReplicaSet
  version: 8.0.4-ent
---
apiVersion: mongodb.com/v1
kind: MongoDBUser
metadata:
  name: cn-x509-client-o-mongodb
spec:
  db: $external
  mongodbResourceRef:
    name: x509-rs
  roles:
  - db: secure-db
    name: readWrite
  username: CN=x509-client,O=MongoDB
---
apiVersion: mongodb.com/v1
kind: MongoDBUser
metadata:
  name: cn-x509-admin-ou-devops-o-mongodb
spec:
  db: $external
  mongodbResourceRef:
    name: x509-rs
  roles:
  - db: admin
    name: root
  username: CN=x509-admin,OU=DevOps,O=MongoDB

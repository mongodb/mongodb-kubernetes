---
# Single-cluster sharded MongoDB source used by the simulated-MC sharded
# MongoDBSearch e2e (`simulated_mc_sharded_basic.py`). Deployed by the central
# operator on `kind-e2e-operator`. NOT topology=MultiCluster — this PR exercises
# the simulated-MC Search side only; cross-cluster sharded MongoDB is out of
# scope. Smallest viable footprint: 2 shards × 1 mongod, 1 configsrv, 1 mongos.
apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  name: mdb-mc-sim-sh
spec:
  type: ShardedCluster
  version: 8.2.0-ent
  shardCount: 2
  mongodsPerShardCount: 1
  mongosCount: 1
  configServerCount: 1
  credentials: my-credentials
  opsManager:
    configMapRef:
      name: my-project
  logLevel: WARN
  persistent: true
  mongos: {}
  shard: {}
  configSrv: {}

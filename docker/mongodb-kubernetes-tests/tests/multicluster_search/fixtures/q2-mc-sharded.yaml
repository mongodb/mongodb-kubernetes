---
# Q2-MC MongoDBSearch fixture: multi-cluster sharded source using the new
# spec.clusters[] distribution shape AND the external sharded-cluster source
# block (router + shards). The test populates one clusters[] entry per
# member cluster.
#
# externalHostname carries BOTH {clusterName} and {shardName} placeholders.
apiVersion: mongodb.com/v1
kind: MongoDBSearch
metadata:
  name: mdb-sh-q2-mc
spec:
  logLevel: DEBUG
  source:
    external:
      shardedCluster:
        router:
          hosts:
            - "PLACEHOLDER_ROUTER_HOST:27017"
        shards:
          - shardName: shard-0
            hosts:
              - "PLACEHOLDER_SHARD_0_HOST:27017"
          - shardName: shard-1
            hosts:
              - "PLACEHOLDER_SHARD_1_HOST:27017"
  security:
    tls:
      certsSecretPrefix: certs
  loadBalancer:
    managed:
      externalHostname: "{clusterName}-{shardName}.search-lb.example.com:443"
  # The test rewrites this slice to len(member_cluster_clients) entries.
  clusters: []

apiVersion: mongodb.com/v1
kind: MongoDBOpsManager
metadata:
  name: om-full
spec:
  replicas: 1
  version: 5.0.1
  adminCredentials: ops-manager-admin-secret
  jvmParameters:
    - "-XX:TieredStopAtLevel=1"
  configuration:
    mms.testUtil.enabled: "true"
  backup:
    enabled: false
  applicationDatabase:
    members: 3
    version: 4.4.20-ent


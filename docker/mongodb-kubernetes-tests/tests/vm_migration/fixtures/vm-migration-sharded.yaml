---
apiVersion: mongodb.com/v1
kind: MongoDB
metadata:
  name: sharded-migration
spec:
  type: ShardedCluster
  shardCount: 1
  mongodsPerShardCount: 3
  mongosCount: 2
  configServerCount: 3
  version: "" # filled in by test
  opsManager:
    configMapRef:
      name: my-project
  credentials: my-credentials
  persistent: false

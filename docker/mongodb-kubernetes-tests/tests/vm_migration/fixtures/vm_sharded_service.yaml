apiVersion: v1
kind: Service
metadata:
  name: vm-sharded-mongod
  labels:
    app: vm-sharded-mongod
spec:
  type: ClusterIP
  clusterIP: None  # headless: vm-sharded-mongod-0.vm-sharded-mongod.ns.svc.cluster.local resolves to pod IP
  selector:
    app: vm-sharded-mongod
  ports:
    - port: 27017
      targetPort: 27017
      name: mongodb

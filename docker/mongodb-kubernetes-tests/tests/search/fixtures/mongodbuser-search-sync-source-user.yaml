apiVersion: mongodb.com/v1
kind: MongoDBUser
metadata:
  name: search-sync-source-user
spec:
  username: search-sync-source
  db: admin
  mongodbResourceRef:
    name: mdb-rs
  passwordSecretKeyRef:
    name: mdb-rs-search-sync-source-password
    key: password
  roles:
  - name: searchCoordinator
    db: admin

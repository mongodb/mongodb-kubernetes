---
apiVersion: mongodb.com/v1
kind: MongoDBStandbyCluster
metadata:
  name: monarch-standby-cluster
spec:
  # mongoDBResourceRef points at the standby RS that receives oplog from the injector sidecar.
  mongoDBResourceRef:
    name: monarch-standby-rs
  opsManager:
    configMapRef:
      name: my-project
  credentials: my-credentials
  monarch:
    # replicaSetId is the active RS shard ID (passed as --shardId to the Monarch shipper/injector).
    # The injector reads S3 data under {clusterPrefix}/{replicaSetId}/...
    replicaSetId: monarch-active-rs
    clusterPrefix: failoverdemo
    credentialsSecretRef:
      name: monarch-s3-creds
    s3BucketName: monarch-standby-bucket
    awsRegion: eu-north-1
    # s3BucketEndpoint: set at runtime via resource["spec"]["monarch"]["s3BucketEndpoint"]
    s3PathStyleAccess: true
    injectorVersion: "0.1.1"
  # injectorImage: set at runtime from INJECTOR_IMAGE env var

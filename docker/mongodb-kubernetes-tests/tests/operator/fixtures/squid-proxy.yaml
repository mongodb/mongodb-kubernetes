---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squid-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squid
      role: operator-tests
  template:
    metadata:
      labels:
        app: squid
        role: operator-tests
    spec:
      containers:
      - name: squid
        image: ubuntu/squid:edge
        ports:
        - containerPort: 3128
          name: squid
          protocol: TCP
        volumeMounts:
        - name: squid-config-volume
          mountPath: /etc/squid/squid.conf
          subPath: squid.conf
      volumes:
      - name: squid-config-volume
        configMap:
          name: squid-config
          items:
          - key: squid
            path: squid.conf
---
apiVersion: v1
kind: Service
metadata:
  name: squid-service
  labels:
    app: squid
    role: operator-tests
spec:
  ports:
  - port: 3128
  selector:
    app: squid
    role: operator-tests

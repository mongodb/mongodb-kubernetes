# Example: How to modify .evergreen.yml to add path-based filtering
# This shows the BEFORE and AFTER for one variant

# ============================================================================
# BEFORE: Current configuration (no filtering)
# ============================================================================
# 
# buildvariants:
#   - name: e2e_mdb_community
#     display_name: e2e_mdb_community
#     tags: [ "pr_patch", "staging", "e2e_test_suite" ]
#     run_on:
#       - ubuntu2404-large
#     <<: *community_dependency
#     tasks:
#       - name: e2e_mdb_community_task_group

# ============================================================================
# AFTER: With path-based filtering using activate condition
# ============================================================================
#
# buildvariants:
#   - name: e2e_mdb_community
#     display_name: e2e_mdb_community
#     tags: [ "pr_patch", "staging", "e2e_test_suite" ]
#     activate:
#       - func: clone
#       - func: setup_jq  # Required: jq is needed for should_run.sh
#       - command: shell.exec
#         params:
#           shell: bash
#           working_dir: src/github.com/mongodb/mongodb-kubernetes
#           script: scripts/evergreen/should_run.sh e2e_tests
#     run_on:
#       - ubuntu2404-large
#     <<: *community_dependency
#     tasks:
#       - name: e2e_mdb_community_task_group
#
# Note: The `activate` section runs BEFORE the variant is scheduled.
# If the script exits with code != 0, the variant is skipped entirely.
# The script takes scope as argument: e2e_tests, unit_tests, or build_images

# ============================================================================
# ALTERNATIVE: Using run_task_conditionally (for dynamic task addition)
# ============================================================================
#
# This approach requires creating a new task that conditionally adds tasks:
#
# tasks:
#   - name: conditionally_add_e2e_tasks
#     tags: [ "pr_patch" ]
#     commands:
#       - func: clone
#       - func: setup_jq  # Required: jq is needed for should_run.sh
#       - func: run_task_conditionally
#         vars:
#           condition_script: scripts/evergreen/should_run.sh e2e_tests
#           variant: e2e_mdb_community
#           task: e2e_mdb_community_task_group
#
# Then ensure this task runs early in the build (maybe in init_test_run variant)


#       - command: shell.exec
#         params:
#           shell: bash
#           working_dir: src/github.com/mongodb/mongodb-kubernetes
#           script: |
#             if ! scripts/evergreen/should_run.sh e2e_tests; then
#               echo "Skipping e2e tests - only non-production files changed"
#               exit 0

#
# Note: This still schedules the task but exits early, so some setup overhead remains.

# ============================================================================
# RECOMMENDED: Start with variant-level activate for e2e variants
# ============================================================================
#
# This is the cleanest approach because:
# 1. Variants don't appear in Evergreen UI if skipped
# 2. No resources are wasted
# 3. Easy to understand
#
# Apply to all variants with tag "e2e_test_suite" and "pr_patch"

  <!--
    MongoDB brand fonts. Lexend Deca (body) and Source Code Pro (mono)
    are pulled from the @fontsource jsDelivr mirror (versioned, stable
    URL — same pinning rationale as the Excalidraw bundle below) and
    registered under Excalidraw's hardcoded canvas font names
    "Helvetica" (fontFamily 2) and "Cascadia" (fontFamily 3) so the
    canvas measureText/fillText calls resolve to the brand fonts.

    We register the fonts *programmatically* via FontFace.load() in the
    bootstrap script below (rather than via @font-face CSS) so the load
    is fully synchronised with the canvas-measurement code path:
    Excalidraw's convertToExcalidrawElements runs measureText
    immediately on call, so it must observe the loaded font NOW, not
    "eventually". CSS @font-face + document.fonts.load() works in a
    real browser tab but headless Chrome with --dump-dom captures the
    DOM before async font fetches resolve, leaving canvas with system
    fallback metrics. FontFace + document.fonts.add() with awaited
    .load() is deterministic.

    If jsDelivr is offline the fetch throws, the catch block falls
    through, and Excalidraw renders with system Helvetica/Cascadia
    (i.e. pre-fix behaviour) instead of hanging.
  -->
  <style>
    html,body,#root{margin:0;padding:0;height:100%;width:100%;overflow:hidden;font-family:"Helvetica",system-ui}
    #canonical{display:none}
  </style>

  <script>
    // Resolve `fixedPoint` arrow bindings to concrete x/y/width/height/points
    // geometry. Excalidraw treats bindings as advisory — they update arrow
    // endpoints when a bound shape MOVES, but on a fresh mount the arrow is
    // drawn from its literal x/y + points. If the author supplied
    // `x: 0, y: 0, points: [[0,0],[40,0]]` and trusted the bindings to
    // position the arrow, the result is a 40-px line at canvas (0,0) — i.e.
    // off-screen and invisible. This shim runs before mount/canonicalize and
    // rewrites such arrows to the real geometry inferred from the bound
    // shapes. Polyline arrows (3+ points) are left alone: a bend pattern is
    // intentional geometry that we shouldn't flatten.
    function resolveFixedPointArrows(els) {
      const byId = Object.create(null);
      for (const e of els) byId[e.id] = e;
      return els.map(e => {
        if (e.type !== "arrow") return e;
        const sb = e.startBinding, eb = e.endBinding;
        const sFP = sb && Array.isArray(sb.fixedPoint) ? sb.fixedPoint : null;
        const eFP = eb && Array.isArray(eb.fixedPoint) ? eb.fixedPoint : null;
        if (!sFP || !eFP) return e;
        const src = byId[sb.elementId], dst = byId[eb.elementId];
        if (!src || !dst) return e;
        if (typeof src.x !== "number" || typeof dst.x !== "number") return e;
        // Skip polylines — they have intentional geometry.
        if (Array.isArray(e.points) && e.points.length > 2) return e;
        const sx = src.x + (src.width || 0) * sFP[0];
        const sy = src.y + (src.height || 0) * sFP[1];
        const ex = dst.x + (dst.width || 0) * eFP[0];
        const ey = dst.y + (dst.height || 0) * eFP[1];
        return Object.assign({}, e, {
          x: sx, y: sy,
          width: ex - sx, height: ey - sy,
          points: [[0, 0], [ex - sx, ey - sy]],
        });
      });
    }

    // Brand fonts to register under Excalidraw's hardcoded family names.
    // Each entry is [family-name-Excalidraw-asks-for, weight, woff2 URL].
    // Three Lexend Deca weights cover the body-text range Excalidraw
    // emits at fontSize 14-28; one Source Code Pro Medium covers
    // monospace. Add more here if the diagrams ever need extra weights.
    // Excalidraw's getFontString() produces e.g. "16px Cascadia" with no
    // weight token, which the CSS font shorthand parses as
    // font-weight:normal (400). The FontFaceSet then looks for a 400
    // face under that family name; if there isn't one, it can fall back
    // to a system match instead of stretching our 500. Register all four
    // weights at the same URL (the woff2 itself is one weight; CSS just
    // points multiple FontFace entries at the same source) so any
    // Excalidraw weight request matches.
    const LEXEND = "https://cdn.jsdelivr.net/npm/@fontsource/lexend-deca@5.1.0/files/lexend-deca-latin-400-normal.woff2";
    const LEXEND_300 = "https://cdn.jsdelivr.net/npm/@fontsource/lexend-deca@5.1.0/files/lexend-deca-latin-300-normal.woff2";
    const LEXEND_500 = "https://cdn.jsdelivr.net/npm/@fontsource/lexend-deca@5.1.0/files/lexend-deca-latin-500-normal.woff2";
    const SCP = "https://cdn.jsdelivr.net/npm/@fontsource/source-code-pro@5.1.0/files/source-code-pro-latin-500-normal.woff2";
    const BRAND_FONTS = [
      ["Helvetica", "300", LEXEND_300],
      ["Helvetica", "400", LEXEND],
      ["Helvetica", "500", LEXEND_500],
      // Source Code Pro Medium covers all canvas-asks-for-Cascadia
      // weights — Excalidraw never goes mono+bold, but registering 400
      // and 500 against the same woff2 is a belt-and-braces guard
      // against the FontFaceSet resolving 400 to a system fallback.
      ["Cascadia",  "400", SCP],
      ["Cascadia",  "500", SCP],
    ];

    async function loadBrandFonts() {
      // Per-font fetch+load+add, all in parallel. We collect the loaded
      // FontFace instances so the caller could inspect them; don't fail
      // the whole batch if one URL is unreachable — render with whatever
      // we got and let the rest fall back to system fonts.
      const tasks = BRAND_FONTS.map(async ([family, weight, url]) => {
        try {
          const resp = await fetch(url);
          if (!resp.ok) return null;
          const buf = await resp.arrayBuffer();
          const ff = new FontFace(family, buf, { weight });
          await ff.load();
          document.fonts.add(ff);
          return ff;
        } catch (_) {
          return null;
        }
      });
      // Hard cap: don't let the brand-font fetch block the render forever
      // if the CDN is down. 6s is well above a warm-cache load (<300ms
      // total) and still under Chrome's 30s virtual-time-budget for
      // canonicalize. After the timeout we proceed with whatever fonts
      // managed to register; missing fonts fall through to system
      // Helvetica/Cascadia (i.e. pre-fix behaviour, not a hard fail).
      await Promise.race([
        Promise.all(tasks),
        new Promise(r => setTimeout(r, 6000)),
      ]);
    }

    (async () => {

      // called below, because that function runs Canvas2D measureText
      // synchronously to compute text bounding boxes. If the font isn't
      // registered with the FontFaceSet at measure time, measureText
      // falls back to system Helvetica/Cascadia (typically much narrower
      // than Lexend Deca / Source Code Pro), the bounding box is too
      // small, and text clips on the user's first save when the real
      // font finally loads and re-flows.
      await loadBrandFonts();

      const scene = JSON.parse(document.getElementById("diagram-scene").textContent);
      // Normalize compact/shorthand elements (labeled shapes, etc.) into
      // Excalidraw's canonical form via the library's own helper. This splits
      // `{label}` rectangles into shape + bound text, measures text geometry
      // with Canvas 2D (pixel-accurate), and fills in bookkeeping fields.
      // Scenes that are already normalized pass through unchanged.
      const pseudoTypes = new Set(["cameraUpdate", "restoreCheckpoint", "delete"]);
      const rawReal = (scene.elements || []).filter(e => !pseudoTypes.has(e.type));
      // `convertToExcalidrawElements` expects skeleton input (shapes with a
      // `label: {...}` shorthand). Running it over already-canonical elements
      // (shape + separate text with `containerId`) clobbers the container
      // binding, so labels end up left-aligned against the box edge. Detect
      // skeleton form by presence of the `label` shorthand key.
      // Resolve placeholder arrow geometry from fixedPoint bindings BEFORE
      // convertToExcalidrawElements runs — the converter consumes
      // `fixedPoint` and rewrites bindings into the internal `focus`/`gap`
      // form, after which the shim has nothing to read. Runs in both
      // canonicalize and render branches: if the arrow is bound but its
      // x/y/points haven't been set, this is the only place it gets correct
      // geometry before paint.
      const skeletonResolved = resolveFixedPointArrows(rawReal);

      const isSkeleton = skeletonResolved.some(e => e && typeof e.label === "object" && e.label !== null);
      let normalizedElements = (isSkeleton && ExcalidrawLib.convertToExcalidrawElements)
        ? ExcalidrawLib.convertToExcalidrawElements(skeletonResolved, { regenerateIds: false })
        : skeletonResolved;

      const params = new URLSearchParams(location.search);
      // Canonicalize mode: run the scene through convertToExcalidrawElements
      // + restoreElements (which fills in all default bookkeeping fields, the
      // way Excalidraw's "Save to..." does), stuff the result into #canonical
      // as JSON text, and skip the React mount entirely. The parent Python
      // process reads it back via --dump-dom.
      if (params.get("canonicalize") === "1") {
        const restored = ExcalidrawLib.restoreElements
          ? ExcalidrawLib.restoreElements(normalizedElements, null)
          : normalizedElements;
        const canonical = {
          type: "excalidraw",
          version: 2,
          source: "mck-dev diagram skill",
          elements: restored,
          appState: { viewBackgroundColor: "#ffffff", gridSize: null },
          files: {},
        };
        document.getElementById("canonical").textContent = JSON.stringify(canonical);
      } else {
        // Query params for viewport control:
        //   ?zoom=1.5           absolute zoom factor (1 = 100%)
        //   ?fit=0.9            fit-to-viewport with this zoom multiplier (default 0.9)
        //   ?cx=400&cy=300      scene-space coords to center on viewport (requires zoom)
        //   ?ui=0               hide the Excalidraw editor UI for clean screenshots
        const qZoom = parseFloat(params.get("zoom"));
        const qFit  = parseFloat(params.get("fit"));
        const qCx   = parseFloat(params.get("cx"));
        const qCy   = parseFloat(params.get("cy"));
        const hideUI = params.get("ui") === "0";
        const App = () => {
          return React.createElement("div", {style: {height: "100vh"}},
            React.createElement(ExcalidrawLib.Excalidraw, {
              initialData: {
                elements: normalizedElements,
                appState: {viewBackgroundColor: "#ffffff"},
              },
              UIOptions: hideUI ? { canvasActions: { changeViewBackgroundColor:false, clearCanvas:false, export:false, loadScene:false, saveToActiveFile:false, theme:false, saveAsImage:false }, welcomeScreen:false, tools:{image:false} } : undefined,
              viewModeEnabled: hideUI,
              excalidrawAPI: (api) => {
                setTimeout(() => {
                  if (!isNaN(qZoom)) {
                    const W = window.innerWidth, H = window.innerHeight;
                    const els = normalizedElements.filter(e => !e.isDeleted && typeof e.x === "number");
                    const xs = els.map(e => e.x), ys = els.map(e => e.y);
                    const xe = els.map(e => e.x + (e.width||0)), ye = els.map(e => e.y + (e.height||0));
                    const bx = (Math.min(...xs) + Math.max(...xe)) / 2;
                    const by = (Math.min(...ys) + Math.max(...ye)) / 2;
                    const cx = isNaN(qCx) ? bx : qCx;
                    const cy = isNaN(qCy) ? by : qCy;
                    api.updateScene({ appState: {
                      zoom: { value: qZoom },
                      scrollX: W / (2 * qZoom) - cx,
                      scrollY: H / (2 * qZoom) - cy,
                    }});
                  } else {
                    // Manual bounding-box fit. scrollToContent({fitToViewport})
                    // produces NaN zoom on some hand-written scenes (blank canvas
                    // with "NaN%" zoom indicator); compute zoom + scroll ourselves
                    // from explicit x/y/width/height, which never NaNs.
                    const W = window.innerWidth, H = window.innerHeight;
                    const els = normalizedElements.filter(e => !e.isDeleted && typeof e.x === "number");
                    if (els.length === 0) return;
                    const xs = els.map(e => e.x), ys = els.map(e => e.y);
                    const xe = els.map(e => e.x + (e.width||0)), ye = els.map(e => e.y + (e.height||0));
                    const minX = Math.min(...xs), minY = Math.min(...ys);
                    const maxX = Math.max(...xe), maxY = Math.max(...ye);
                    const contentW = Math.max(1, maxX - minX);
                    const contentH = Math.max(1, maxY - minY);
                    const fit = isNaN(qFit) ? 0.9 : qFit;
                    const zoom = Math.min(W / contentW, H / contentH) * fit;
                    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
                    api.updateScene({ appState: {
                      zoom: { value: zoom },
                      scrollX: W / (2 * zoom) - cx,
                      scrollY: H / (2 * zoom) - cy,
                    }});
                  }
                }, 50);
              }
            })
          );
        };
        ReactDOM.createRoot(document.getElementById("root"))
          .render(React.createElement(App));
      }
    })();
  </script>
</body>
</html>
